<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学習時間カウンター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #4a4e55;
      --muted: #8a9098;
      --line: rgba(74, 78, 85, 0.12);
      --panel: rgba(255, 255, 255, 0.82);
      --accent: #e8b4bc;
      --accent-deep: #d497a1;
      --accent-soft: #fff0f3;
      --water: #b7d4e3;
      --water-deep: #9ec4d6;
      --water-soft: #eef7fb;
      --warn: #e0a090;
      --sat: #7eb3de;
      --sat-soft: #e8f4fc;
      --sun: #e8908a;
      --sun-soft: #fff0ee;
      --bg1: #fff7f8;
      --bg2: #eef6fb;
      --bg3: #ffeef2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans JP", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 55% at 10% 0%, var(--bg2), transparent 55%),
        radial-gradient(ellipse 65% 45% at 90% 5%, var(--bg3), transparent 50%),
        linear-gradient(165deg, #fffafa, #f5f9fc 48%, #fff6f8);
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    header h1 {
      font-family: Syne, "IBM Plex Sans JP", sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    header p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .total {
      display: grid;
      gap: 8px;
      padding: 22px 24px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      margin-bottom: 18px;
    }

    .total-label {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .total-num {
      font-family: "IBM Plex Sans JP", sans-serif;
      font-size: clamp(2.6rem, 8vw, 3.6rem);
      font-weight: 700;
      line-height: 1.25;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .total-num span {
      font-size: 0.55em;
      margin-left: 0.12em;
      margin-right: 0.2em;
      color: var(--ink);
      font-weight: 700;
    }

    .subtotals {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .subtotals strong { color: var(--ink); font-weight: 600; }

    .panel {
      padding: 16px 18px 18px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .days {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .day-btn, .amt-btn, .util-btn {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid rgba(74, 78, 85, 0.22);
      background: #fff;
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.05s;
    }

    .day-btn:hover, .amt-btn:hover, .util-btn:hover {
      background: #fff7f9;
      border-color: rgba(196, 136, 148, 0.55);
    }

    .day-btn:active, .amt-btn:active, .util-btn:active {
      transform: scale(0.97);
    }

    .day-btn.active {
      background: #c48894;
      border-color: #c48894;
      color: #fff;
    }

    .day-btn.sat {
      background: #e8f4fc;
      border-color: rgba(90, 143, 181, 0.45);
      color: #3d6f96;
      font-weight: 700;
    }

    .day-btn.sat:hover {
      background: #d7ecf9;
      border-color: rgba(90, 143, 181, 0.65);
    }

    .day-btn.sat.active {
      background: #5a9fd0;
      border-color: #5a9fd0;
      color: #fff;
    }

    .day-btn.sun {
      background: #fff0ee;
      border-color: rgba(196, 116, 110, 0.45);
      color: #b45a54;
      font-weight: 700;
    }

    .day-btn.sun:hover {
      background: #ffe3df;
      border-color: rgba(196, 116, 110, 0.65);
    }

    .day-btn.sun.active {
      background: #d97872;
      border-color: #d97872;
      color: #fff;
    }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .amt-btn.primary {
      background: #e8f3f9;
      border-color: rgba(90, 143, 181, 0.4);
      color: #3d5f73;
    }

    .amt-btn.break {
      background: #fff0f3;
      border-color: rgba(196, 136, 148, 0.45);
      color: #9a5f6c;
    }

    .list li.break-item {
      background: #fff5f7;
      border-color: rgba(196, 136, 148, 0.4);
    }

    .list li.break-item strong {
      color: #9a5f6c;
    }

    .hint {
      margin: 10px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    #textHint {
      color: #d64545;
      font-weight: 600;
    }

    .quick {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick input {
      flex: 1 1 220px;
      font-family: inherit;
      font-size: 0.95rem;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      outline: none;
    }

    .quick input:focus {
      border-color: rgba(232, 180, 188, 0.7);
      box-shadow: 0 0 0 3px rgba(232, 180, 188, 0.25);
    }

    .quick .util-btn.add {
      background: #c48894;
      border-color: #c48894;
      color: #fff;
    }

    .examples {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 0.95rem;
    }

    .list .meta { color: var(--muted); font-size: 0.85rem; }

    .list button {
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--warn);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 6px;
    }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 12px;
    }

    .util-btn.ghost {
      background: transparent;
    }

    .day-subtotal {
      display: flex;
      align-items: baseline;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 18px;
      margin-bottom: 14px;
      border-radius: 16px;
      background: var(--accent-soft);
      border: 1px solid rgba(232, 180, 188, 0.45);
    }

    .day-subtotal-label {
      font-size: 0.95rem;
      color: var(--ink);
      font-weight: 600;
    }

    .day-subtotal-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>学習時間カウンター</h1>
      <p>１週間の学習時間を計算します</p>
    </header>

    <section class="total" aria-live="polite">
      <div class="total-label">いまの週合計</div>
      <div class="total-num" id="totalHours">0<span>時間</span></div>
      <div class="subtotals">
        <div>平日 <strong id="weekdayHours">0時間</strong></div>
        <div>週末 <strong id="weekendHours">0時間</strong></div>
        <div>件数 <strong id="slotCount">0</strong></div>
      </div>
    </section>

    <section class="panel">
      <h2>1. 曜日を選ぶ</h2>
      <div class="days" id="days" role="group" aria-label="曜日"></div>
      <p class="hint" id="dayHint">曜日を押してから、下の時間を追加してください。</p>
    </section>

    <div class="day-subtotal" aria-live="polite">
      <span class="day-subtotal-label" id="daySubtotalLabel">月曜日の合計</span>
      <span class="day-subtotal-value" id="daySubtotalValue">0時間</span>
    </div>

    <section class="panel">
      <h2>2. 時間を足す</h2>
      <div class="amounts">
        <button type="button" class="amt-btn primary" data-minutes="10">+10分</button>
        <button type="button" class="amt-btn primary" data-minutes="15">+15分</button>
        <button type="button" class="amt-btn primary" data-minutes="30">+30分</button>
        <button type="button" class="amt-btn primary" data-minutes="45">+45分</button>
        <button type="button" class="amt-btn primary" data-minutes="60">+1時間</button>
        <button type="button" class="amt-btn primary" data-minutes="120">+2時間</button>
        <button type="button" class="amt-btn primary" data-minutes="300">+5時間</button>
      </div>
    </section>

    <section class="panel">
      <h2>3. 休憩を引く</h2>
      <div class="amounts">
        <button type="button" class="amt-btn break" data-minutes="-30" data-label="休憩 30分">休憩 30分</button>
        <button type="button" class="amt-btn break" data-minutes="-60" data-label="休憩 1時間">休憩 1時間</button>
        <button type="button" class="amt-btn break" data-minutes="-120" data-label="休憩 2時間">休憩 2時間</button>
      </div>
    </section>

    <section class="panel">
      <h2>テキスト入力</h2>
      <div class="quick">
        <input id="quickInput" type="text" placeholder="例：45分、9-17(休憩1時間)、40分×2、2時間" />
        <button type="button" class="util-btn add" id="addText">追加</button>
      </div>
      <p class="examples">Enter は 2回で追加。</p>
      <p class="hint" id="textHint"></p>
    </section>

    <section class="panel">
      <h2>内訳</h2>
      <div class="toolbar">
        <button type="button" class="util-btn ghost" id="undoBtn">ひとつ戻す</button>
        <button type="button" class="util-btn ghost" id="resetBtn">全部クリア</button>
      </div>
      <ul class="list" id="slotList"></ul>
      <p class="empty" id="emptyMsg">まだ何も入っていません。</p>
    </section>
  </div>

  <script>
    const DAYS = [
      { key: "月", weekend: false },
      { key: "火", weekend: false },
      { key: "水", weekend: false },
      { key: "木", weekend: false },
      { key: "金", weekend: false },
      { key: "土", weekend: true },
      { key: "日", weekend: true },
    ];

    const dayMap = Object.fromEntries(DAYS.map((d) => [d.key, d]));
    let selectedDay = "月";
    let slots = [];

    const daysEl = document.getElementById("days");
    const dayHint = document.getElementById("dayHint");
    const totalHours = document.getElementById("totalHours");
    const weekdayHours = document.getElementById("weekdayHours");
    const weekendHours = document.getElementById("weekendHours");
    const slotCount = document.getElementById("slotCount");
    const slotList = document.getElementById("slotList");
    const emptyMsg = document.getElementById("emptyMsg");
    const quickInput = document.getElementById("quickInput");
    const textHint = document.getElementById("textHint");
    const daySubtotalLabel = document.getElementById("daySubtotalLabel");
    const daySubtotalValue = document.getElementById("daySubtotalValue");

    function formatHours(minutes) {
      const h = minutes / 60;
      const abs = Math.abs(h);
      const body = Number.isInteger(abs) ? String(abs) : abs.toFixed(1).replace(/\.0$/, "");
      return h < 0 ? `-${body}` : body;
    }

    function formatHoursMinutes(minutes) {
      const sign = minutes < 0 ? "-" : "";
      const abs = Math.abs(minutes);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      if (h === 0 && m === 0) return "0時間";
      if (h === 0) return `${sign}${m}分`;
      if (m === 0) return `${sign}${h}時間`;
      return `${sign}${h}時間${m}分`;
    }

    function formatTotalHtml(minutes) {
      const sign = minutes < 0 ? "-" : "";
      const abs = Math.abs(minutes);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      if (h === 0 && m === 0) return `0<span>時間</span>`;
      if (h === 0) return `${sign}${m}<span>分</span>`;
      if (m === 0) return `${sign}${h}<span>時間</span>`;
      return `${sign}${h}<span>時間</span>${m}<span>分</span>`;
    }

    function renderDays() {
      daysEl.innerHTML = "";
      DAYS.forEach((d) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day-btn" + (d.key === selectedDay ? " active" : "");
        if (d.key === "土") btn.classList.add("sat");
        if (d.key === "日") btn.classList.add("sun");
        btn.textContent = d.key;
        btn.addEventListener("click", () => {
          selectedDay = d.key;
          dayHint.textContent = `${d.key}曜日が選択中。時間ボタンを押すとその分が足されます。`;
          renderDays();
          updateDaySubtotal();
        });
        daysEl.appendChild(btn);
      });
    }

    function addSlot(day, minutes, label, skipRender) {
      if (!dayMap[day] || !minutes) return false;
      slots.push({
        id: crypto.randomUUID(),
        day,
        minutes,
        label: label || `${formatHours(minutes)}時間`,
      });
      if (!skipRender) render();
      return true;
    }

    function removeSlot(id) {
      slots = slots.filter((s) => s.id !== id);
      render();
    }

    function updateDaySubtotal() {
      const daySlots = slots.filter((s) => s.day === selectedDay);
      const minutes = daySlots.reduce((sum, s) => sum + s.minutes, 0);
      const breakMinutes = daySlots
        .filter((s) => s.minutes < 0)
        .reduce((sum, s) => sum + Math.abs(s.minutes), 0);

      daySubtotalLabel.textContent = `${selectedDay}曜日の合計`;
      daySubtotalValue.textContent = breakMinutes > 0
        ? `${formatHoursMinutes(minutes)}（休憩：${formatHoursMinutes(breakMinutes)}）`
        : formatHoursMinutes(minutes);
    }

    function render() {
      let weekday = 0;
      let weekend = 0;
      slots.forEach((s) => {
        if (dayMap[s.day].weekend) weekend += s.minutes;
        else weekday += s.minutes;
      });
      const total = weekday + weekend;

      totalHours.innerHTML = formatTotalHtml(total);
      weekdayHours.textContent = formatHoursMinutes(weekday);
      weekendHours.textContent = formatHoursMinutes(weekend);
      slotCount.textContent = String(slots.length);
      updateDaySubtotal();

      slotList.innerHTML = "";
      if (slots.length === 0) {
        emptyMsg.hidden = false;
      } else {
        emptyMsg.hidden = true;
        slots.forEach((s) => {
          const li = document.createElement("li");
          if (s.minutes < 0) li.classList.add("break-item");
          li.innerHTML = `<div><strong>${s.day}</strong>　${s.label}<div class="meta">${formatHoursMinutes(s.minutes)}</div></div>`;
          const del = document.createElement("button");
          del.type = "button";
          del.textContent = "削除";
          del.addEventListener("click", () => removeSlot(s.id));
          li.appendChild(del);
          slotList.appendChild(li);
        });
      }
    }

    function normalizeInput(text) {
      return text
        .replace(/[０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xff10 + 0x30))
        .replace(/[〜～]/g, "-")
        .replace(/[至到]/g, "-")
        .replace(/　/g, " ")
        .replace(/（/g, "(")
        .replace(/）/g, ")")
        .replace(/：/g, ":");
    }

    function daysFromToken(token) {
      if (/土日|週末/.test(token)) return ["土", "日"];
      const m = token.match(/[月火水木金土日]/);
      return m ? [m[0]] : [];
    }

    function splitDayBlocks(text) {
      const re = /土日(?:曜)?|週末|(?:月|火|水|木|金|土|日)(?:曜日|曜)?/g;
      const matches = [...text.matchAll(re)];
      if (matches.length === 0) {
        return [{ days: [selectedDay], body: text.trim() }];
      }
      return matches.map((match, i) => {
        const start = match.index + match[0].length;
        const end = i + 1 < matches.length ? matches[i + 1].index : text.length;
        return {
          days: daysFromToken(match[0]),
          body: text.slice(start, end).trim(),
        };
      });
    }

    function durationToMinutes(n, unit) {
      if (/分/.test(unit)) return n;
      if (/時間|時|^h$/i.test(unit)) return n * 60;
      return n >= 10 ? n : n * 60;
    }

    function extractBreaks(body) {
      const breaks = [];
      const re = /\(?\s*休憩\s*(\d+(?:\.\d+)?)\s*(時間|時|h|分)?\s*\)?/gi;
      const cleaned = body.replace(re, (_, num, unit) => {
        const minutes = durationToMinutes(Number(num), unit || "時間");
        breaks.push({
          minutes: -minutes,
          label: `休憩 ${formatHoursMinutes(minutes)}`,
        });
        return " ";
      });
      return { breaks, cleaned };
    }

    function extractRanges(body) {
      const ranges = [];
      const re = /(\d{1,2})\s*:?\s*(\d{0,2})\s*-\s*(\d{1,2})\s*:?\s*(\d{0,2})/g;
      const cleaned = body.replace(re, (_, a, b, c, d) => {
        const sh = Number(a);
        const sm = Number(b || 0);
        const eh = Number(c);
        const em = Number(d || 0);
        let minutes = eh * 60 + em - (sh * 60 + sm);
        if (minutes <= 0) minutes += 24 * 60;
        const label = `${sh}:${String(sm).padStart(2, "0")}–${eh}:${String(em).padStart(2, "0")}`;
        ranges.push({ minutes, label });
        return " ";
      });
      return { ranges, cleaned };
    }

    function extractDurations(body) {
      const items = [];
      const re = /(\d+(?:\.\d+)?)\s*(時間|時|h|分)/gi;
      let match;
      while ((match = re.exec(body)) !== null) {
        const minutes = durationToMinutes(Number(match[1]), match[2]);
        items.push({
          minutes,
          label: /分/.test(match[2]) ? `${minutes}分` : `${formatHours(minutes)}時間`,
        });
      }
      return items;
    }

    function parseBlock(days, body) {
      const results = [];
      if (!days.length) return results;

      const { breaks, cleaned: withoutBreaks } = extractBreaks(body);
      const { ranges, cleaned: withoutRange } = extractRanges(withoutBreaks);
      const durations = extractDurations(withoutRange);

      days.forEach((day) => {
        ranges.forEach((r) => results.push({ day, ...r }));
        durations.forEach((d) => results.push({ day, ...d }));
        breaks.forEach((b) => results.push({ day, ...b }));
      });

      return results;
    }

    function expandMultiplications(text) {
      // 45×2 / 45分×2 / 2時間×3 → 同じ時間を繰り返しに展開
      return text.replace(
        /(\d+(?:\.\d+)?)\s*(時間|時|h|分)?\s*[×xX✕✖＊*]\s*(\d+)/g,
        (_, num, unit, count) => {
          const times = Math.min(Number(count), 30);
          if (!times || times < 1) return _;
          const u = unit || "分";
          return Array.from({ length: times }, () => `${num}${u}`).join("、");
        }
      );
    }

    function parseMany(text) {
      const normalized = expandMultiplications(normalizeInput(text)).trim();
      if (!normalized) return [];
      return splitDayBlocks(normalized).flatMap((block) => parseBlock(block.days, block.body));
    }

    document.querySelectorAll(".amt-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const minutes = Number(btn.dataset.minutes);
        const label = btn.dataset.label || `${formatHours(minutes)}時間`;
        addSlot(selectedDay, minutes, label);
      });
    });

    document.getElementById("addText").addEventListener("click", () => {
      const parsedList = parseMany(quickInput.value);
      if (parsedList.length === 0) {
        textHint.textContent = "書けませんでした。例の文章をそのまま貼ってみてください";
        enterArmed = false;
        return;
      }
      parsedList.forEach((parsed, i) => {
        addSlot(parsed.day, parsed.minutes, parsed.label, i < parsedList.length - 1);
      });
      quickInput.value = "";
      enterArmed = false;
      textHint.textContent = "";
    });

    let enterArmed = false;
    let enterTimer = null;

    quickInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (e.isComposing || e.keyCode === 229) return;

      e.preventDefault();

      if (!enterArmed) {
        enterArmed = true;
        textHint.textContent = "もう一度 Enter を押すと追加されます";
        clearTimeout(enterTimer);
        enterTimer = setTimeout(() => {
          enterArmed = false;
        }, 2500);
        return;
      }

      enterArmed = false;
      clearTimeout(enterTimer);
      document.getElementById("addText").click();
    });

    quickInput.addEventListener("input", () => {
      enterArmed = false;
      clearTimeout(enterTimer);
      textHint.textContent = "";
    });

    document.getElementById("undoBtn").addEventListener("click", () => {
      slots.pop();
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      slots = [];
      render();
    });

    renderDays();
    render();
  </script>
</body>
</html>
